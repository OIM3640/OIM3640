<!DOCTYPE html>
<html>
<head>
    <title>Embedded Google Map</title>
    <style>
        iframe {
            border: 0;
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>
    <h1>My Map</h1>
    <iframe
        src="https://www.google.com/maps?q={{ latitude }},{{ longitude }}&hl=es;z=14&output=embed">
    </iframe>
</body>
</html>
